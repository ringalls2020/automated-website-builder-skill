<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      .clip { position: absolute; inset: 0; }
      #site {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: auto;
        display: block;
        will-change: transform;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="__DURATION__"
      data-width="1920"
      data-height="1080"
    >
      <div id="site-clip" class="clip" data-start="0" data-duration="__DURATION__" data-track-index="1" data-layout-allow-overflow>
        <img id="site" src="capture/desktop/full-page.png" alt="prospect site" />
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo(
        "#site",
        { y: 0 },
        { y: __SCROLL_END__, duration: __DURATION__, ease: "none" },
        0
      );
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
